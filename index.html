<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XYQ VIDEO V5.0 一机一码生成器</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    padding: 24px;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,.35);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
    background: linear-gradient(90deg, #f472b6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .desc {
    color: #9ca3af;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .group {
    background: #0b1220;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
  }
  label {
    display: block;
    margin-bottom: 8px;
    color: #cbd5e1;
    font-size: 14px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #020617;
    color: #f8fafc;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }
  .btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .primary {
    background: #3b82f6;
    color: #ffffff;
  }
  .secondary {
    background: #334155;
    color: #e2e8f0;
  }
  .result {
    margin-top: 14px;
    background: #020617;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 14px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.7;
    color: #f8fafc;
  }
  .ok { color: #4ade80; font-weight: bold; }
  .bad { color: #f87171; }
  .mono {
    font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>XYQ VIDEO V5.0 离线激活码生成器</h1>
      <div class="desc">
        本生成器采用 <b>HMAC-SHA256</b> 硬件绑定技术，生成的卡密仅限指定机器使用。
      </div>

      <div class="group">
        <label for="macInput">机器码 (从 V5.0 界面复制)</label>
        <input id="macInput" placeholder="例如：DC5B9FA6-E8547655-594360DB-C7FBF099" />
        
        <div class="btns">
          <button class="primary" onclick="generateKey()">生成 V5.0 专用永久卡密</button>
          <button class="secondary" onclick="copyGenerated()">复制卡密</button>
        </div>
        <div class="result mono" id="generateResult">等待输入...</div>
      </div>
    </div>
  </div>

<script>
  const LICENSE_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const LICENSE_SECRET = "Seedance2.0|V5-LICENSE|2026|Dreamina-USA";

  async function hmacSha256(key, message) {
    const enc = new TextEncoder();
    const cryptoKey = await crypto.subtle.importKey(
      "raw", enc.encode(key),
      { name: "HMAC", hash: "SHA-256" },
      false, ["sign"]
    );
    const signature = await crypto.subtle.sign("HMAC", cryptoKey, enc.encode(message));
    return new Uint8Array(signature);
  }

  function base32Encode(bytes) {
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"; // Standard Base32
    let bits = "";
    for (const b of bytes) bits += b.toString(2).padStart(8, "0");
    let output = "";
    for (let i = 0; i < bits.length; i += 5) {
        let chunk = bits.slice(i, i + 5).padEnd(5, "0");
        output += alphabet[parseInt(chunk, 2)];
    }
    return output;
  }

  async function getChecksumChar(text) {
    const msgUint8 = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const digest = new Uint8Array(hashBuffer);
    const val = (digest[0] << 8) | digest[1];
    return LICENSE_ALPHABET[val % LICENSE_ALPHABET.length];
  }

  async function generateKey() {
    const mac = document.getElementById("macInput").value.trim().replace(/[^0-9A-F]/gi, "").toUpperCase();
    const box = document.getElementById("generateResult");

    if (!mac) {
      box.innerHTML = '<span class="bad">× 请输入有效的机器码</span>';
      return;
    }

    try {
      const prefix = "SD5";
      const lType = "P";
      const payload = `${prefix}|${mac}|${lType}`;
      const digest = await hmacSha256(LICENSE_SECRET, payload);
      
      // Base32 编码并过滤
      const encoded = base32Encode(digest);
      let body = "";
      for (const ch of encoded) {
          if (LICENSE_ALPHABET.includes(ch)) body += ch;
          if (body.length === 20) break;
      }
      while (body.length < 20) body += "X";
      
      const keyNoChecksum = `${prefix}${lType}${body}`;
      const checksum = await getChecksumChar(keyNoChecksum);
      const fullKey = keyNoChecksum + checksum;
      
      // 格式化输出
      const formatted = `${prefix}-${lType}-${body.match(/.{1,5}/g).join("-")}-${checksum}`;
      
      box.innerHTML = `<span class="ok">生成成功！</span>\n卡密: <b style="color:#60a5fa">${formatted}</b>\n说明: 该卡密已与机器码 ${mac} 绑定。`;
    } catch (err) {
      box.innerHTML = `<span class="bad">× 错误: ${err.message}</span>`;
    }
  }

  function copyGenerated() {
    const box = document.getElementById("generateResult");
    const match = box.innerText.match(/卡密:\s*([A-Z0-9\-]+)/);
    if (match) {
        navigator.clipboard.writeText(match[1]);
        alert("已复制到剪贴板");
    }
  }
</script>
</body>
</html>
